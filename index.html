<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gramophone</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">

        <div id="gramophone">

            <div id="record">
              <div id="grooves"></div>
             <div id="label">
               <img id="coverImage" alt="Album Cover" draggable="false">
                 <div id="hole"></div>
                 <div id="spindle"></div>
               </div>
             </div>
            <div id="tonearm">
                 <div id="toneBase"></div>
                 <div id="armJoint"></div>
              <div id="needle">
                <div id="needleTip"></div>
              </div>
            </div>
           <div id="horn">
             <svg viewBox="0 0 160 200" preserveAspectRatio="none" style="width:100%;height:100%;overflow:visible;">
               <defs>
                 <linearGradient id="brassGrad" x1="10%" y1="90%" x2="90%" y2="10%">
                   <stop offset="0%" stop-color="#7c5a22"/>
                   <stop offset="45%" stop-color="#c9a24d"/>
                   <stop offset="100%" stop-color="#f6dfa0"/>
                 </linearGradient>
                 <radialGradient id="bellInner" cx="45%" cy="45%" r="65%">
                   <stop offset="0%" stop-color="#2a1a08"/>
                   <stop offset="100%" stop-color="#050505"/>
                 </radialGradient>
               </defs>
               <path d="M20 190 C 12 150, 26 118, 52 98 C 76 80, 66 48, 96 32"
                     fill="none" stroke="url(#brassGrad)" stroke-width="16" stroke-linecap="round"/>
               <path d="M96 32 C 128 8, 158 4, 156 38 C 154 74, 118 96, 88 80 C 74 72, 80 48, 96 32 Z"
                     fill="url(#brassGrad)" stroke="#7c5a22" stroke-width="1"/>
               <ellipse cx="126" cy="44" rx="32" ry="19" fill="url(#bellInner)" stroke="#f6dfa0" stroke-width="3" transform="rotate(-18 126 44)"/>
               <circle cx="20" cy="190" r="9" fill="#e2e2e2" stroke="#8a8a8a" stroke-width="2"/>
             </svg>
           </div>
             <button id="playBtn">▶</button>
<button id="resetBtn">↺</button>

<div id="progressContainer">
    <div id="progress"></div>
</div>

<div id="timeDisplay">00:00 / 00:00</div>
<div id="songInfo">
    <div id="songTitle">Unknown Song</div>
    <div id="artistName">Unknown Artist</div>
</div>
<input
    type="range"
    id="volume"
    min="0"
    max="1"
    step="0.01"
    value="1">
</div>
</div>
<input
    type="file"
    id="fileInput"
    accept="audio/*"
    hidden>
<audio id="music" src="music.mp3"></audio>
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<script src="script.js"></script>
</body>
</html>
